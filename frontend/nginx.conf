server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
 
    # SPA 라우팅 지원: 실제 파일/폴더가 없으면 index.html로 넘겨서
    # React Router가 브라우저에서 경로를 처리하게 함
    # (이게 없으면 새로고침 시 /login, /list 같은 경로에서 404 발생)
    location / {
        try_files $uri $uri/ /index.html;
    }
 
    # 정적 자산(JS, CSS, 이미지)은 캐싱 적용
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }
}
 