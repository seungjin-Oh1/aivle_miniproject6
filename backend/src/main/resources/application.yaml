spring:
  application:
    name: backend


  datasource:
    url: jdbc:h2:file:./data/bookdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 1234


  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


server:
  port: 8080

jwt:
  secret: aivle-bookmanager-secret-key-must-be-long-enough-256bit
  expiration: 86400000

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:}
    region: ${AWS_REGION:us-east-1}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true