apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
spec:
  replicas: 1   # EBS(RWO)는 한 Pod만 쓰기 마운트 가능하므로 1개로 고정. 늘리면 두 번째 Pod가 볼륨을 못 잡아 Pending 상태가 됨
  strategy:
    type: RollingUpdate     # 결정된 배포 전략: Rolling
    rollingUpdate:
      maxUnavailable: 0     # 기존 Pod를 내리기 전에 새 Pod를 먼저 띄움 (replica 1개라도 무중단 시도)
      maxSurge: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa   # IRSA로 연결된 ServiceAccount -> S3 book-covers/* 접근 권한 자동 부여
      containers:
        - name: backend
          image: 416225317325.dkr.ecr.us-east-1.amazonaws.com/backend/user02:latest
          ports:
            - containerPort: 8080
          env:
            - name: AWS_S3_BUCKET
              value: "user02-book-covers"
            - name: AWS_REGION
              value: "us-east-1"
          volumeMounts:
            - name: backend-data
              mountPath: /app/data   # WORKDIR /app + application.yaml의 jdbc:h2:file:./data/bookdb -> 실제 경로는 /app/data/bookdb
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: backend-data-pvc